name: Build Native Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build Fat-JAR + Windows Binary
        shell: cmd
        run: build.bat

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: meindrk-cli-windows-x64
          path: build/meindrk-cli-windows-x64.exe

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build Linux Binary
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: meindrk-cli-linux-x64
          path: build/meindrk-cli-linux-x64

  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build macOS arm64 Binary
        run: |
          chmod +x build-linux.sh
          mkdir -p tmp/classes tmp/fat build
          javac --release 21 -cp "lib/jackson/*" -d tmp/classes \
            src/de/kreisalarm/cli/Config.java \
            src/de/kreisalarm/cli/RestClient.java \
            src/de/kreisalarm/cli/TablePrinter.java \
            src/de/kreisalarm/cli/CLI.java
          (cd tmp/fat && for f in ../../lib/jackson/jackson-{core,annotations,databind}-*.jar; do jar xf "$f"; done)
          cp -r tmp/classes/. tmp/fat/
          printf 'Main-Class: de.kreisalarm.cli.CLI\n\n' > tmp/MANIFEST.MF
          jar cfm tmp/meindrk-cli.jar tmp/MANIFEST.MF -C tmp/fat .
          native-image -jar tmp/meindrk-cli.jar --no-fallback \
            --enable-url-protocols=https \
            -o build/meindrk-cli-macos-arm64

      - name: Upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: meindrk-cli-macos-arm64
          path: build/meindrk-cli-macos-arm64

  build-macos-x64:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build macOS x86_64 Binary
        run: |
          mkdir -p tmp/classes tmp/fat build
          javac --release 21 -cp "lib/jackson/*" -d tmp/classes \
            src/de/kreisalarm/cli/Config.java \
            src/de/kreisalarm/cli/RestClient.java \
            src/de/kreisalarm/cli/TablePrinter.java \
            src/de/kreisalarm/cli/CLI.java
          (cd tmp/fat && for f in ../../lib/jackson/jackson-{core,annotations,databind}-*.jar; do jar xf "$f"; done)
          cp -r tmp/classes/. tmp/fat/
          printf 'Main-Class: de.kreisalarm.cli.CLI\n\n' > tmp/MANIFEST.MF
          jar cfm tmp/meindrk-cli.jar tmp/MANIFEST.MF -C tmp/fat .
          native-image -jar tmp/meindrk-cli.jar --no-fallback \
            --enable-url-protocols=https \
            -o build/meindrk-cli-macos-x64

      - name: Upload x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: meindrk-cli-macos-x64
          path: build/meindrk-cli-macos-x64

  build-macos-universal:
    name: macOS Universal
    needs: [build-macos-arm64, build-macos-x64]
    runs-on: macos-latest
    steps:
      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: meindrk-cli-macos-arm64
          path: artifacts/arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: meindrk-cli-macos-x64
          path: artifacts/x64

      - name: Create Universal Binary
        run: |
          chmod +x artifacts/arm64/meindrk-cli-macos-arm64 artifacts/x64/meindrk-cli-macos-x64
          lipo -create \
            artifacts/arm64/meindrk-cli-macos-arm64 \
            artifacts/x64/meindrk-cli-macos-x64 \
            -output meindrk-cli-macos-universal
          file meindrk-cli-macos-universal

      - name: Upload Universal binary
        uses: actions/upload-artifact@v4
        with:
          name: meindrk-cli-macos-universal
          path: meindrk-cli-macos-universal

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/meindrk-cli-windows-x64/meindrk-cli-windows-x64.exe
            artifacts/meindrk-cli-linux-x64/meindrk-cli-linux-x64
            artifacts/meindrk-cli-macos-universal/meindrk-cli-macos-universal
